<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chatbot — Product Support</title>
<style>
  :root {
    --bg: #F4F6F8; --ink: #17222C; --slate: #64707C; --line: #D8DEE4;
    --accent: #0B6CDB; --accent-soft: #E8F1FC; --card: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 15px; font-weight: 650; }
  header .session { font-family: Consolas, monospace; font-size: 11px; color: var(--slate); }
  #messages { flex: 1; overflow-y: auto; padding: 20px; max-width: 780px; width: 100%; margin: 0 auto; }
  .msg { margin-bottom: 14px; max-width: 85%; }
  .msg.user { margin-left: auto; }
  .bubble {
    padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5;
    background: var(--card); border: 1px solid var(--line);
  }
  .msg.user .bubble { background: var(--accent); color: #fff; border: none; }
  .meta {
    font-family: Consolas, monospace; font-size: 10.5px; color: var(--slate);
    margin-top: 4px; word-break: break-all;
  }
  .meta .sources { color: var(--accent); }
  form {
    display: flex; gap: 10px; padding: 14px 20px; background: var(--card);
    border-top: 1px solid var(--line); max-width: 780px; width: 100%; margin: 0 auto;
  }
  input {
    flex: 1; padding: 10px 14px; border: 1.5px solid var(--line); border-radius: 8px;
    font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    padding: 10px 18px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .disclaimer {
    text-align: center; font-size: 11px; color: var(--slate);
    padding: 6px 20px 12px; background: var(--card);
  }
</style>
</head>
<body>
  <header>
    <h1>Product Support Assistant</h1>
    <span class="session" id="session"></span>
  </header>

  <div id="messages"></div>

  <form id="form">
    <input id="input" placeholder="Ask about your equipment… (try: how do I fix error E42?)" autocomplete="off">
    <button id="send" type="submit">Send</button>
  </form>
  <div class="disclaimer">AI assistant answering from product documentation only — not medical advice.</div>

<script>
  // Session persists across messages so the server can load conversation history from Postgres.
  let sessionId = null;
  const messages = document.getElementById("messages");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  function add(role, text, meta) {
    const m = document.createElement("div");
    m.className = "msg " + role;
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = text;
    m.appendChild(b);
    if (meta) {
      const d = document.createElement("div");
      d.className = "meta";
      d.innerHTML = meta;
      m.appendChild(d);
    }
    messages.appendChild(m);
    messages.scrollTop = messages.scrollHeight;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    add("user", q);
    input.value = "";
    send.disabled = true;
    try {
      const r = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: q, session_id: sessionId }),
      });
      const data = await r.json();
      sessionId = data.session_id;
      document.getElementById("session").textContent = "session " + sessionId.slice(0, 8);
      // trace_id shown on purpose: the demo is "copy this, find the same trace in App Insights".
      add("assistant", data.answer,
        `<span class="sources">sources: ${data.sources.join(", ") || "none"}</span><br>trace_id: ${data.trace_id}`);
    } catch (err) {
      add("assistant", "Request failed: " + err.message);
    } finally {
      send.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
